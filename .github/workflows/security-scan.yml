name: Sec Mapper Scan

on:
  pull_request:
  push:
    branches: [ main, master ]

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run scanner JSON
        run: |
          python main.py samples/package.json --lock samples/package-lock.json --format json --fail-on-severity high > scan-results.json
      - name: Run scanner SARIF
        run: |
          python main.py samples/package.json --lock samples/package-lock.json --format sarif
      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: samples/package.sarif.json
      - name: Upload JSON artifact
        uses: actions/upload-artifact@v4
        with:
          name: sec-mapper-json
          path: scan-results.json
